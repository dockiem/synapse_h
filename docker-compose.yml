services:
  api:
    build: .
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    volumes:
      - ./data:/src/data:ro
    profiles:
      - test
